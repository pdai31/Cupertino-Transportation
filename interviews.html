<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Community Interviews — Cupertino Safe Streets</title>
<link rel="stylesheet" href="css/style.css">
<script src="js/data.js"></script>
<script src="js/main.js"></script>
<style>
  .int-card { display: flex; flex-direction: column; gap: 12px; }
  .int-head { display: flex; gap: 16px; align-items: center; }
  .video-ph { background: #1c2b26; color: #9dc3b6; border-radius: 10px; height: 170px; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 6px; font-size: 0.9rem; }
  .video-ph .play { font-size: 2.4rem; }
  .filter-chips { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 26px; }
  .chip { border: 1.5px solid var(--border); background: #fff; border-radius: 24px; padding: 7px 18px; cursor: pointer; font-weight: 600; font-family: inherit; font-size: 0.9rem; }
  .chip.active { background: var(--primary); color: #fff; border-color: var(--primary); }
  details.transcript { font-size: 0.88rem; color: var(--text-light); }
  details.transcript summary { cursor: pointer; color: var(--primary); font-weight: 600; }
</style>
</head>
<body>

<header class="page-header">
  <div class="container">
    <h1>🎙 Community Voices</h1>
    <p>Real stories from the people who walk, bike, and drive Cupertino's streets every day. Each interview includes video, audio, an AI-generated transcript and summary, and key quotes.</p>
  </div>
</header>

<section class="page-section">
  <div class="container">
    <div class="filter-chips" id="chips">
      <button class="chip active" data-f="">All</button>
      <button class="chip" data-f="Parent">Parents</button>
      <button class="chip" data-f="Cyclist">Cyclists</button>
      <button class="chip" data-f="Student">Students</button>
      <button class="chip" data-f="Senior">Seniors</button>
      <button class="chip" data-f="Teacher">Teachers</button>
    </div>
    <div class="grid grid-2" id="intGrid"></div>
  </div>
</section>

<script>
const INTERVIEWS = [
  { name: "Mei L.", role: "Parent", emoji: "👩", bio: "Mother of two students at Lincoln Elementary; walks her kids to school daily.",
    summary: "Mei describes daily anxiety at the school drop-off zone, where double-parked cars force children into the street. She wants clearer drop-off rules and a crossing guard at the Finch Ave intersection.",
    quote: "Every morning I hold my breath crossing Finch. The cars just don't stop." },
  { name: "Raj P.", role: "Cyclist", emoji: "🚴", bio: "Commutes by bike from Rancho Rinconada to Apple Park, 5 days a week.",
    summary: "Raj highlights the bike lane gap on McClellan Rd and frequent debris on Stelling Rd. He believes protected lanes would double the number of bike commuters in Cupertino.",
    quote: "The lane just... ends. One moment you're protected, the next you're sharing a lane with a bus." },
  { name: "Jasmine T.", role: "Student", emoji: "🧑‍🎓", bio: "Junior at Monta Vista High School; bikes to school with friends.",
    summary: "Jasmine describes near-misses at McClellan & Bubb during the morning rush. She and her friends now take a longer route to avoid the intersection entirely.",
    quote: "We literally plan our route around the scary intersections. That shouldn't be normal." },
  { name: "Harold W.", role: "Senior", emoji: "👴", bio: "Retired engineer, 40-year Cupertino resident, walks daily for exercise.",
    summary: "Harold finds the pedestrian signal at De Anza & Stevens Creek too short to cross safely. Uneven sidewalks on Bollinger have caused two falls among his walking group this year.",
    quote: "The light changes before I'm halfway across six lanes. I've stopped crossing there." },
  { name: "Ms. Okafor", role: "Teacher", emoji: "👩‍🏫", bio: "Teaches at Kennedy Middle School and supervises bike-to-school programs.",
    summary: "She sees students riding e-bikes without helmets daily and wants safety education integrated into school programs. The dim crossing at Rainbow & Bubb worries her most in winter months.",
    quote: "Kids get e-bikes before they get any training. Education has to come first." },
  { name: "Daniel K.", role: "Student", emoji: "🛴", bio: "8th grader who rides a scooter to Lawson Middle School.",
    summary: "Daniel says the broken pavement near Regnart Creek Trail has caused several scooter accidents among his friends. He'd like more smooth, connected paths to school.",
    quote: "My friend flipped his scooter on that crack. It's been there forever." }
];

document.addEventListener("DOMContentLoaded", function () {
  const grid = document.getElementById("intGrid");
  function render(filter) {
    grid.innerHTML = "";
    INTERVIEWS.filter(i => !filter || i.role === filter).forEach(i => {
      grid.insertAdjacentHTML("beforeend", `
      <div class="card int-card">
        <div class="int-head">
          <div class="avatar">${i.emoji}</div>
          <div>
            <h3 style="margin-bottom:2px">${i.name}</h3>
            <span class="badge badge-cat">${i.role}</span>
            <p style="font-size:0.85rem;color:var(--text-light);margin-top:4px">${i.bio}</p>
          </div>
        </div>
        <div class="video-ph"><span class="play">▶</span>Interview video — coming soon</div>
        <div>
          <strong style="font-size:0.9rem;color:var(--primary-dark)">🤖 AI Summary</strong>
          <p style="font-size:0.92rem">${i.summary}</p>
        </div>
        <div class="quote">"${i.quote}"</div>
        <details class="transcript">
          <summary>Full AI transcript & audio recording</summary>
          <p style="margin-top:8px">Transcript and audio will be published here once the interview is recorded and the participant approves the final version.</p>
        </details>
      </div>`);
    });
  }
  document.querySelectorAll(".chip").forEach(c => c.addEventListener("click", function () {
    document.querySelectorAll(".chip").forEach(x => x.classList.remove("active"));
    this.classList.add("active");
    render(this.dataset.f);
  }));
  render("");
});
</script>
</body>
</html>
